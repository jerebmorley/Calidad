name: Integracion Continua Python

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pruebas:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar pruebas automatizadas
        run: pytest

      - name: Desplegar en Render
        if: success() && github.ref_name == 'main'
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Notificar exito en Slack
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{
            "text": "Integración Continua exitosa\nRepositorio: ${{ github.repository }}\nRama: ${{ github.ref_name }}\nCommit: ${{ github.event.head_commit.message }}\nAutor: ${{ github.actor }}\nEstado: success\nDeploy: ejecutado solo si la rama es main"
          }' \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notificar falla en Slack
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{
            "text": "Integración Continua fallida\nRepositorio: ${{ github.repository }}\nRama: ${{ github.ref_name }}\nCommit: ${{ github.event.head_commit.message }}\nAutor: ${{ github.actor }}\nEstado: failure\nDeploy: no ejecutado\nRevisar logs en GitHub Actions."
          }' \
          ${{ secrets.SLACK_WEBHOOK_URL }}